services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: usersdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password_kamu
    volumes: [./pgdata:/var/lib/postgresql/data]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes: [./minio_data:/data]

  backend:
    build: ./backend
    ports: ["8080:8080"]
    environment:
      DB_HOST: postgres
    depends_on: [postgres, minio]

  frontend:
    image: nginx:alpine
    volumes: [./frontend:/usr/share/nginx/html]
    ports: ["80:80"]
